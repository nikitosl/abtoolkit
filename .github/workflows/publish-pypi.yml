name: Publish package to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY'
          import os
          import re
          import pathlib

          tag = os.getenv("RELEASE_TAG", "")
          event_name = os.getenv("EVENT_NAME", "")

          pyproject = pathlib.Path("pyproject.toml")
          text = pyproject.read_text(encoding="utf-8")
          match = re.search(r'^version\s*=\s*"([^"]+)"', text, flags=re.MULTILINE)
          if not match:
              raise SystemExit("Could not find [project].version in pyproject.toml")

          package_version = match.group(1)

          if event_name == "release":
              normalized_tag = tag[1:] if tag.startswith("v") else tag
              if normalized_tag != package_version:
                  raise SystemExit(
                      f"Release tag '{tag}' does not match package version '{package_version}'"
                  )

          print(f"Version check passed: {package_version}")
          PY

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/abtoolkit
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
