name: CI

on:
  push:
    branches:
      - '**'

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest black pylint

      - name: Run black (format check)
        run: black --check abtoolkit tests

      - name: Run pylint (errors only)
        run: pylint --errors-only abtoolkit

      - name: Run unit tests
        run: pytest -q
